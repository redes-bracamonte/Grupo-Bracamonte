name: Generar páginas de inmuebles

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:          # botón para correrlo manualmente desde GitHub
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar páginas
        env:
          SCRIPT_URL: ${{ secrets.SCRIPT_URL }}
        run: node scripts/build-property-pages.js

      - name: Publicar cambios
        run: |
          git config user.name "bracamonte-bot"
          git config user.email "bot@grupobracamonte.com"
          git add inmuebles
          git diff --cached --quiet || git commit -m "Actualizar páginas de inmuebles"
          git push
